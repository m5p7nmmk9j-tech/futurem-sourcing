name: FUTUREM Enterprise CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  api-build:
    name: API Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore API
        run: dotnet restore api/Futurem.Sourcing.Api/Futurem.Sourcing.Api.csproj
      - name: Build API
        run: dotnet build api/Futurem.Sourcing.Api/Futurem.Sourcing.Api.csproj -c Release --no-restore

  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install Web
        working-directory: web
        run: npm install
      - name: Build Web
        working-directory: web
        run: npm run build

  docker-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Docker Build
        run: docker compose build
