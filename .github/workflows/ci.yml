name: FUTUREM Enterprise CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  api-build:
    name: API Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore API
        run: dotnet restore api/Futurem.Sourcing.Api/Futurem.Sourcing.Api.csproj
      - name: Build API
        run: dotnet build api/Futurem.Sourcing.Api/Futurem.Sourcing.Api.csproj -c Release --no-restore
      - name: Test API
        run: dotnet test api/Futurem.Sourcing.Api.Tests/Futurem.Sourcing.Api.Tests.csproj -c Release

  web-build:
    name: Web Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install Web
        working-directory: web
        run: npm ci
      - name: Test Web
        working-directory: web
        run: npm test
      - name: Build Web
        working-directory: web
        run: npm run build

  docker-build:
    name: Docker Compose Runtime Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and start services
        run: docker compose up -d --build
      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/ > /tmp/api-health.json; then
              cat /tmp/api-health.json
              exit 0
            fi
            sleep 3
          done
          docker compose logs api mysql
          exit 1
      - name: Check Web
        run: curl -fsSI http://localhost:3000/
      - name: Check upgraded database schema
        run: |
          docker exec futurem_mysql mysql -uroot -pfuturem123456 futurem_sourcing -e "
            SHOW TABLES LIKE 'shipment_expenses';
            SHOW TABLES LIKE 'supplier_prepayments';
            SHOW TABLES LIKE 'supplier_prepayment_usages';
            SHOW COLUMNS FROM shipments LIKE 'expense_total';
            SHOW COLUMNS FROM finance_records LIKE 'shipment_expense_id';
          "
      - name: Show service status
        if: always()
        run: docker compose ps
      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=300
      - name: Stop services
        if: always()
        run: docker compose down -v

  source-export:
    name: Export Source Tree
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Upload source tree
        uses: actions/upload-artifact@v4
        with:
          name: source-tree
          path: .
          include-hidden-files: true
          retention-days: 1
