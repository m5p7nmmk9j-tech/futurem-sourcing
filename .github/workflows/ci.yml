name: FUTUREM Enterprise CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  api-build:
    name: API Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore API
        run: dotnet restore api/Futurem.Sourcing.Api/Futurem.Sourcing.Api.csproj
      - name: Build API
        shell: bash
        run: |
          set +e
          dotnet build api/Futurem.Sourcing.Api/Futurem.Sourcing.Api.csproj -c Release --no-restore 2>&1 | tee api-build.log
          status=${PIPESTATUS[0]}
          exit $status
      - name: Upload API build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-build-log
          path: api-build.log
          retention-days: 1
      - name: Test API
        shell: bash
        run: |
          set +e
          dotnet test api/Futurem.Sourcing.Api.Tests/Futurem.Sourcing.Api.Tests.csproj -c Release 2>&1 | tee api-test.log
          status=${PIPESTATUS[0]}
          exit $status
      - name: Upload API test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-log
          path: api-test.log
          retention-days: 1

  web-build:
    name: Web Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install Web
        working-directory: web
        run: npm ci
      - name: Test Web
        working-directory: web
        run: npm test
      - name: Build Web
        working-directory: web
        shell: bash
        run: |
          set +e
          npm run build 2>&1 | tee web-build.log
          status=${PIPESTATUS[0]}
          exit $status
      - name: Upload Web build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-build-log
          path: web/web-build.log
          retention-days: 1

  docker-build:
    name: Docker Compose Runtime Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and start services
        run: docker compose up -d --build
      - name: Wait for API
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:8080/ > /tmp/api-health.json; then
              cat /tmp/api-health.json
              exit 0
            fi
            sleep 3
          done
          docker compose logs --no-color api mysql > docker-runtime.log
          cat docker-runtime.log
          exit 1
      - name: Check Web
        run: curl -fsSI http://localhost:3000/
      - name: Check upgraded database schema
        run: |
          docker exec futurem_mysql mysql -uroot -pfuturem123456 futurem_sourcing -e "
            SHOW TABLES LIKE 'shipment_expenses';
            SHOW TABLES LIKE 'supplier_prepayments';
            SHOW TABLES LIKE 'supplier_prepayment_usages';
            SHOW TABLES LIKE 'warehouses';
            SHOW TABLES LIKE 'warehouse_locations';
            SHOW TABLES LIKE 'inventory_lots';
            SHOW TABLES LIKE 'inventory_transactions';
            SHOW TABLES LIKE 'inventory_reservations';
            SHOW TABLES LIKE 'container_load_sources';
            SHOW TABLES LIKE 'finance_record_lines';
            SHOW COLUMNS FROM container_loads LIKE 'customer_id';
            SHOW COLUMNS FROM container_loads LIKE 'warehouse_id';
            SHOW COLUMNS FROM container_loads LIKE 'inventory_lock_expires_at';
            SHOW COLUMNS FROM shipments LIKE 'customer_id';
            SHOW COLUMNS FROM shipments LIKE 'warehouse_id';
            SHOW COLUMNS FROM shipments LIKE 'container_no';
            SHOW COLUMNS FROM shipments LIKE 'expense_total';
            SHOW COLUMNS FROM finance_records LIKE 'shipment_expense_id';
            SHOW INDEX FROM shipments WHERE Key_name = 'ux_shipment_container_load';
          "
      - name: Show service status
        if: always()
        run: docker compose ps
      - name: Save docker logs
        if: always()
        run: docker compose logs --no-color > docker-runtime.log 2>&1 || true
      - name: Upload docker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-runtime-log
          path: docker-runtime.log
          retention-days: 1
      - name: Show logs on failure
        if: failure()
        run: tail -n 500 docker-runtime.log
      - name: Stop services
        if: always()
        run: docker compose down -v
