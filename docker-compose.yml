services:
  mysql:
    image: mysql:8.0
    container_name: futurem_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: futurem_sourcing
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-futurem123456}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping --silent -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: futurem_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: futurem_api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=futurem_mysql;Port=3306;Database=futurem_sourcing;Uid=root;Pwd=${MYSQL_ROOT_PASSWORD:-futurem123456};
      ConnectionStrings__Redis: redis:6379
      Redis__Enabled: "true"
    ports:
      - "8080:8080"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: futurem_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  mysql_data:
  redis_data:
